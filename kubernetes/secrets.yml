# =============================================================
# SECRETS — icgroup
# =============================================================
# Un Secret stocke les données sensibles (mots de passe, clés)
# encodées en base64. Kubernetes les injecte dans les pods
# sous forme de variables d'environnement.
#
# IMPORTANT : base64 n'est PAS du chiffrement, c'est de
# l'encodage. Ne jamais committer ce fichier avec de vrais
# mots de passe sur un repo public !
#
# Pour encoder en base64 :
#   echo -n "monmotdepasse" | base64
# Pour décoder :
#   echo "bW9ubW90ZGVwYXNzZQ==" | base64 -d
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: icgroup-secrets        # Nom du Secret, référencé par les autres manifests
  namespace: icgroup            # Doit être dans le même namespace
  labels:
    env: prod                   # Label requis sur toutes les ressources
type: Opaque                    # Type générique pour les secrets personnalisés
data:
  # --- PostgreSQL ---
  # Valeurs encodées en base64 :
  # "odoo" en base64       → echo -n "odoo" | base64
  # "odoo_password" en b64 → echo -n "odoo_password" | base64
  POSTGRES_DB:       b2Rvbw==                # "odoo"
  POSTGRES_USER:     b2Rvbw==                # "odoo"
  POSTGRES_PASSWORD: b2Rvb19wYXNzd29yZA==   # "odoo_password"

  # --- pgAdmin ---
  # "admin@icgroup.fr" en base64
  # "pgadmin_password" en base64
  PGADMIN_EMAIL:    YWRtaW5AaWNncm91cC5mcg==    # "admin@icgroup.fr"
  PGADMIN_PASSWORD: cGdhZG1pbl9wYXNzd29yZA==    # "pgadmin_password"
