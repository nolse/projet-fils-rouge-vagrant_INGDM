# =============================================================
# SERVICE — pgAdmin
# =============================================================
# Type NodePort : accessible depuis l'extérieur du cluster.
#
# Accès : http://<minikube-ip>:30050
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: pgadmin-service
  namespace: icgroup
  labels:
    app: pgadmin
    env: prod
spec:
  type: NodePort
  selector:
    app: pgadmin                # Cible les pods avec le label app=pgadmin
  ports:
    - port: 80                  # Port interne du Service
      targetPort: 80            # Port du conteneur pgAdmin
      nodePort: 30050           # Port exposé sur le nœud Minikube
