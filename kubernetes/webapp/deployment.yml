# =============================================================
# DEPLOYMENT - ic-webapp
# =============================================================
# ic-webapp est le site vitrine IC Group.
# Il affiche les liens vers Odoo et pgAdmin via les variables
# ODOO_URL et PGADMIN_URL injectees dans le conteneur.
#
# IMPORTANT - Sur Windows avec Minikube driver Docker :
# L'IP Minikube (192.168.x.x) n'est pas accessible depuis
# le navigateur. Il faut utiliser les ports tunnels 127.0.0.1
# obtenus via : bash kubernetes/commandes_utils.sh open
#
# Les ports changent a chaque session - mettre a jour avec :
# bash kubernetes/commandes_utils.sh update-urls PORT_W PORT_O PORT_P
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-webapp
  namespace: icgroup
  labels:
    app: ic-webapp
    env: prod
spec:
  replicas: 2                   # stateless - peut etre scale a 2+
  selector:
    matchLabels:
      app: ic-webapp
  template:
    metadata:
      labels:
        app: ic-webapp
        env: prod
    spec:
      containers:
        - name: ic-webapp
          image: alphabalde/ic-webapp:1.0
          ports:
            - containerPort: 8080
          env:
            # URL vers Odoo - mise a jour via commandes_utils.sh update-urls
            - name: ODOO_URL
              value: "http://192.168.56.100:30069"

            # URL vers pgAdmin - mise a jour via commandes_utils.sh update-urls
            - name: PGADMIN_URL
              value: "http://192.168.56.100:30050"
