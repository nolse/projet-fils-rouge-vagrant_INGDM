# =============================================================
# SERVICE — ic-webapp
# =============================================================
# Type NodePort : accessible depuis l'extérieur du cluster.
#
# Accès : http://<minikube-ip>:30080
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: ic-webapp-service
  namespace: icgroup
  labels:
    app: ic-webapp
    env: prod
spec:
  type: NodePort
  selector:
    app: ic-webapp              # Cible les pods avec le label app=ic-webapp
  ports:
    - port: 8080                # Port interne du Service
      targetPort: 8080          # Port du conteneur ic-webapp
      nodePort: 30080           # Port exposé sur le nœud Minikube
